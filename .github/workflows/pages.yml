name: GitHub Pages

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  GODOT_VERSION: 4.6.3

jobs:
  build:
    name: Build Web export
    runs-on: ubuntu-latest
    container:
      image: docker://barichello/godot-ci:4.6.3
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup export templates
        run: |
          mkdir -v -p build/web ~/.local/share/godot/export_templates
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable

      - name: Import resources once
        continue-on-error: true
        run: godot --headless -v --import

      - name: Build Web export
        run: |
          set -eu

          version="$(printf '%.12s' "${GITHUB_SHA:?}")"
          versioned_base="index-${version}"

          sed -i 's#progressive_web_app/enabled=true#progressive_web_app/enabled=false#' export_presets.cfg
          godot --headless -v --export-release "Web" "./build/web/${versioned_base}.html"
          mv "./build/web/${versioned_base}.html" ./build/web/index.html

          test -f "./build/web/${versioned_base}.js"
          test -f "./build/web/${versioned_base}.wasm"
          test -f "./build/web/${versioned_base}.pck"
          grep -q "\"executable\":\"${versioned_base}\"" ./build/web/index.html

      - name: Clear legacy web caches
        run: |
          cat > ./build/web/index.service.worker.js <<'EOF'
          const CACHE_PREFIX = 'Pixelorama-sw-cache-';

          self.addEventListener('install', () => {
            self.skipWaiting();
          });

          self.addEventListener('activate', (event) => {
            event.waitUntil(
              caches.keys()
                .then((keys) =>
                  Promise.all(
                    keys
                      .filter((key) => key.startsWith(CACHE_PREFIX))
                      .map((key) => caches.delete(key))
                  )
                )
                .then(() => self.registration.unregister())
                .then(() => self.clients.matchAll({ type: 'window' }))
                .then((clients) =>
                  Promise.all(clients.map((client) => client.navigate(client.url)))
                )
            );
          });
          EOF

      - name: Disable Jekyll
        run: touch ./build/web/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./build/web

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
